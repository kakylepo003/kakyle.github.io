<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For yenyenn</title>
  <link rel="stylesheet" href="first trial.css">
</head>
<body>
  <div>
    <div class="envelope-wrapper" id="envelopeWrapper">
      <div class="envelope">
        <div class="envelope-back"></div>
        <div class="envelope-flap" id="flap"></div>
        <div class="envelope-front"></div>
        <div class="seal" id="seal">💖</div>
        <div class="letter" id="letter">
          <button class="close-btn" id="closeBtn">×</button>
          <h2>Happy Monthsary</h2>
          <div class="letter-content" id="letterContent"></div>
        </div>
      </div>
    </div>
    <p class="hint" id="hint">Click the envelope to open 💌</p>
  </div>

  <script src="first trial.js"></script>
</body>
</html>
